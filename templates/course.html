<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Player | EduGenome</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/static/js/theme.js"></script>
  <style>
    :root {
      --sidebar-width: 320px;
    }
    .player-layout {
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: #f8fafc;
    }
    /* Left Sidebar: Content List */
    .course-sidebar {
      width: var(--sidebar-width);
      background: #fff;
      border-right: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      z-index: 20;
    }
    .course-header {
      padding: 20px;
      border-bottom: 1px solid #e2e8f0;
    }
    .progress-container {
      margin-top: 12px;
      background: #f1f5f9;
      height: 6px;
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: var(--gradient-main);
      width: 0%;
      transition: width 0.3s ease;
    }
    .chapters-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }
    .chapter {
      margin-bottom: 8px;
    }
    .chapter-header {
      padding: 12px 16px;
      background: #f8fafc;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s;
    }
    .chapter-header:hover { background: #f1f5f9; }
    .chapter-units {
      display: none;
      padding: 4px 0 4px 12px;
    }
    .chapter.active .chapter-units { display: block; }
    .chapter.active .chevron { transform: rotate(180deg); }
    
    .unit-item {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #64748b;
      transition: all 0.2s;
    }
    .unit-item:hover { background: rgba(124, 58, 237, 0.05); color: var(--accent); }
    .unit-item.active { background: rgba(124, 58, 237, 0.1); color: var(--accent); font-weight: 500; }
    .unit-item.completed i { color: #10b981; }

    /* Right: Main Player */
    .main-player {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .content-area {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 20px;
      width: 100%;
    }
    .video-wrapper {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      margin-bottom: 24px;
    }
    .unit-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .unit-title { font-size: 24px; font-weight: 700; color: #1e293b; }
    
    .action-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 32px;
    }
    .action-card {
      background: #fff;
      padding: 24px;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      text-align: center;
      transition: all 0.3s;
      cursor: pointer;
    }
    .action-card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    .action-card i { font-size: 32px; color: var(--accent); margin-bottom: 12px; }
    .action-card h4 { font-weight: 600; margin-bottom: 8px; }
    
    .complete-btn {
      width: 100%;
      padding: 16px;
      background: var(--gradient-main);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      margin-top: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .complete-btn.done { background: #10b981; pointer-events: none; }

    @media (max-width: 1024px) {
      .course-sidebar { position: fixed; left: -100%; height: 100%; transition: 0.3s; }
      .course-sidebar.open { left: 0; }
      .player-layout { padding-top: 60px; }
      .mobile-toggle { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: #fff; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #e2e8f0; z-index: 30; }
    }
  </style>
</head>
<body data-theme="purple">

<div class="player-layout">
  <!-- Sidebar -->
  <aside class="course-sidebar" id="courseSidebar">
    <div class="course-header">
      <h3 id="courseTitle">Loading...</h3>
      <div style="display:flex; justify-content: space-between; font-size:12px; color:#64748b; margin-top:15px">
        <span>Your Progress</span>
        <span id="progressText">0%</span>
      </div>
      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>
    <div class="chapters-list" id="chaptersList">
      <!-- Chapters added via JS -->
    </div>
    <div style="padding:15px; border-top: 1px solid #e2e8f0">
       <a href="/mycourses" style="display:flex; align-items:center; gap:8px; font-size:14px; color:#64748b">
         <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Back to Courses
       </a>
    </div>
  </aside>

  <!-- Mobile Header -->
  <div class="mobile-toggle">
    <button onclick="toggleSidebar()" class="btn-icon"><i data-lucide="menu"></i></button>
    <span style="font-weight:600; margin-left:15px">Course Content</span>
  </div>

  <!-- Main Content -->
  <main class="main-player">
    <div class="content-area" id="contentArea" style="display:none">
      <div class="video-wrapper">
        <video id="unitVideo" controls width="100%" style="border-radius:16px">
          <source src="" type="video/mp4">
        </video>
      </div>
      
      <div class="unit-meta">
        <div>
          <h1 class="unit-title" id="unitTitle">Unit Title</h1>
          <p style="color:#64748b" id="unitSubtitle">Chapter Name</p>
        </div>
      </div>

      <div class="action-cards">
        <div class="action-card" onclick="openPDF()">
          <i data-lucide="file-text"></i>
          <h4>Study Notes</h4>
          <p class="text-sm text-muted">Read and download PDF</p>
        </div>
        <div class="action-card" onclick="startQuiz()">
          <i data-lucide="brain"></i>
          <h4>Unit Quiz</h4>
          <p class="text-sm text-muted">Test your knowledge</p>
        </div>
      </div>

      <button class="complete-btn" id="completeBtn" onclick="markComplete()">
        <i data-lucide="check-circle"></i> Mark as Completed
      </button>
    </div>
    
    <!-- Empty State -->
    <div id="emptyState" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#94a3b8">
      <i data-lucide="play-circle" style="width:64px;height:64px;margin-bottom:16px"></i>
      <p>Select a unit to start learning</p>
    </div>
  </main>
</div>

<script>
  let currentCourse = null;
  let currentUnitId = null;
  let completedUnits = [];

  async function loadCourse() {
    const params = new URLSearchParams(window.location.search);
    const courseId = params.get('id');
    if(!courseId) return window.location.href = '/mycourses';

    const res = await fetch(`/api/courses/${courseId}`);
    const data = await res.json();
    
    currentCourse = data.course;
    completedUnits = data.completedUnits || [];
    
    renderCourse();
  }

  function renderCourse() {
    document.getElementById('courseTitle').textContent = currentCourse.title;
    const list = document.getElementById('chaptersList');
    list.innerHTML = '';

    let totalUnits = 0;
    let completedCount = 0;

    currentCourse.chapters.forEach((chapter, cIndex) => {
      const chapEl = document.createElement('div');
      chapEl.className = 'chapter active'; // Default open
      
      let unitsHTML = '';
      chapter.units.forEach(unit => {
        totalUnits++;
        const isDone = completedUnits.includes(unit._id);
        if(isDone) completedCount++;
        
        unitsHTML += `
          <div class="unit-item ${isDone ? 'completed' : ''}" onclick="selectUnit('${unit._id}', '${chapter.title}')" data-id="${unit._id}">
            <i data-lucide="${isDone ? 'check-circle' : 'play-circle'}" style="width:16px;height:16px"></i>
            <span>${unit.title}</span>
          </div>
        `;
      });

      chapEl.innerHTML = `
        <div class="chapter-header" onclick="this.parentElement.classList.toggle('active')">
          <span>${chapter.title}</span>
          <i data-lucide="chevron-down" class="chevron" style="width:16px;height:16px"></i>
        </div>
        <div class="chapter-units">${unitsHTML}</div>
      `;
      list.appendChild(chapEl);
    });

    const percent = Math.round((completedCount / totalUnits) * 100) || 0;
    document.getElementById('progressBar').style.width = percent + '%';
    document.getElementById('progressText').textContent = percent + '%';
    
    lucide.createIcons();
  }

  function selectUnit(unitId, chapterTitle) {
    let unit = null;
    currentCourse.chapters.forEach(c => {
      const found = c.units.find(u => u._id === unitId);
      if(found) unit = found;
    });

    if(!unit) return;
    currentUnitId = unitId;

    // UI Updates
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('contentArea').style.display = 'block';
    document.getElementById('unitTitle').textContent = unit.title;
    document.getElementById('unitSubtitle').textContent = chapterTitle;
    
    const video = document.getElementById('unitVideo');
    video.src = unit.videoUrl;
    video.load();

    // Set active class in sidebar
    document.querySelectorAll('.unit-item').forEach(el => el.classList.remove('active'));
    document.querySelector(`[data-id="${unitId}"]`).classList.add('active');

    // Completion button state
    const btn = document.getElementById('completeBtn');
    if(completedUnits.includes(unitId)) {
      btn.classList.add('done');
      btn.innerHTML = '<i data-lucide="check-circle"></i> Completed';
    } else {
      btn.classList.remove('done');
      btn.innerHTML = '<i data-lucide="check-circle"></i> Mark as Completed';
    }
    
    lucide.createIcons();
    if(window.innerWidth < 1024) toggleSidebar(); // Close sidebar on mobile after selection
  }

  async function markComplete() {
    if(!currentUnitId) return;
    
    const res = await fetch(`/api/unit/${currentUnitId}/complete`, { method: 'PATCH' });
    const data = await res.json();
    
    if(!data.error) {
      completedUnits = data.completedUnits;
      renderCourse();
      selectUnit(currentUnitId, document.getElementById('unitSubtitle').textContent);
    }
  }

  function openPDF() {
    let unit = null;
    currentCourse.chapters.forEach(c => {
      const found = c.units.find(u => u._id === currentUnitId);
      if(found) unit = found;
    });
    if(unit && unit.pdfUrl) window.open(unit.pdfUrl, '_blank');
  }

  function startQuiz() {
     // Navigate to quiz page with unit ID
     window.location.href = `/quiz?unitId=${currentUnitId}`;
  }

  function toggleSidebar() {
    document.getElementById('courseSidebar').classList.toggle('open');
  }

  window.onload = loadCourse;
</script>

</body>
</html>
