<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduGenome - Authentication</title>

  <link rel="stylesheet" href="/static/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

  <div class="login-layout">

    <div class="flex items-center justify-center p-6 bg-white" style="overflow-y:auto">
      <div style="width:100%;max-width:420px">

        <div class="text-center mb-8">
          <h2 id="pageTitle">Welcome Back</h2>
          <p id="pageDesc">Sign in to continue</p>
        </div>

        <!-- FORM -->
        <div class="card">

          <div id="nameField" style="display:none;">
            <input type="text" id="name" placeholder="Full Name">
          </div>

          <input type="email" id="email" placeholder="Email">
          <input type="password" id="password" placeholder="Password">

          <div id="confirmPasswordField" style="display:none;">
            <input type="password" id="confirmPassword" placeholder="Confirm Password">
          </div>

          <button onclick="submitForm()" id="submitBtn">Sign In</button>

        </div>

        <p id="toggleText">
          Don't have an account?
          <a href="#" onclick="toggleMode(event)">Sign Up</a>
        </p>

      </div>
    </div>

  </div>

  <script>
    lucide.createIcons();

    let isLoginMode = true;

    // Toggle login/register
    function toggleMode(e) {
      e.preventDefault();
      isLoginMode = !isLoginMode;

      document.getElementById('nameField').style.display = isLoginMode ? 'none' : 'block';
      document.getElementById('confirmPasswordField').style.display = isLoginMode ? 'none' : 'block';

      document.getElementById('submitBtn').innerText = isLoginMode ? 'Sign In' : 'Register';

      document.getElementById('toggleText').innerHTML = isLoginMode
        ? `Don't have an account? <a href="#" onclick="toggleMode(event)">Sign Up</a>`
        : `Already have an account? <a href="#" onclick="toggleMode(event)">Sign In</a>`;
    }

    // MAIN FUNCTION
    async function submitForm() {

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        alert("Enter email and password");
        return;
      }

      // ================= REGISTER =================
      if (!isLoginMode) {

        const name = document.getElementById('name').value.trim();
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (!name) return alert("Enter name");
        if (password !== confirmPassword) return alert("Passwords do not match");

        try {
          const res = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password })
          });

          const data = await res.json();

          if (res.ok) {
            alert("Account created! Please login.");
            isLoginMode = true;
            toggleMode(new Event('click'));
          } else {
            alert(data.error || "Registration failed");
          }

        } catch {
          alert("Server error");
        }

      }

      // ================= LOGIN =================
      else {

        try {
          const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });

          const data = await res.json();

          if (!res.ok) {
            alert(data.error || "Invalid login");
            return;
          }

          // 🔥 SAFE REDIRECT FIX
          if (data.redirect) {
            window.location.href = data.redirect;
          } else {
            window.location.href = "/student";
          }

        } catch {
          alert("Server error");
        }
      }
    }
  </script>

</body>

</html>
