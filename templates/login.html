<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduGenome - Login</title>

  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <div class="login-layout">

    <!-- LEFT -->
    <div class="flex items-center justify-center p-6 bg-white">
      <div style="width:100%;max-width:420px">

        <div class="text-center mb-8">
          <h2 id="pageTitle">Welcome Back</h2>
          <p id="pageDesc">Sign in to continue</p>
        </div>

        <!-- ROLE -->
        <div class="tabs-list tabs-3 mb-4">
          <button class="tab-trigger active" onclick="setRole('student', this)">Student</button>
          <button class="tab-trigger" onclick="setRole('teacher', this)">Teacher</button>
          <button class="tab-trigger" onclick="setRole('admin', this)">Admin</button>
        </div>

        <!-- FORM -->
        <div class="card">

          <input id="name" placeholder="Full Name" style="display:none">
          <input id="email" placeholder="Email">
          <input id="password" type="password" placeholder="Password">
          <input id="confirmPassword" type="password" placeholder="Confirm Password" style="display:none">

          <button onclick="submitForm()">Sign In</button>

        </div>

        <p id="toggleText">
          Don't have an account?
          <a href="#" onclick="toggleMode(event)">Sign Up</a>
        </p>

      </div>
    </div>

  </div>

  <script>
    lucide.createIcons();

    let currentRole = 'student';
    let isLogin = true;

    function setRole(role, el) {
      currentRole = role;

      document.querySelectorAll('.tab-trigger').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
    }

    function toggleMode(e) {
      e.preventDefault();
      isLogin = !isLogin;

      document.getElementById('name').style.display = isLogin ? 'none' : 'block';
      document.getElementById('confirmPassword').style.display = isLogin ? 'none' : 'block';

      document.querySelector('button').innerText = isLogin ? 'Sign In' : 'Create Account';

      document.getElementById('toggleText').innerHTML =
        isLogin
          ? `Don't have an account? <a href="#" onclick="toggleMode(event)">Sign Up</a>`
          : `Already have an account? <a href="#" onclick="toggleMode(event)">Sign In</a>`;
    }

    // ================= SUBMIT =================

    async function submitForm() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        return alert("Enter email & password");
      }

      // REGISTER
      if (!isLogin) {
        const name = document.getElementById('name').value.trim();
        const confirm = document.getElementById('confirmPassword').value;

        if (!name) return alert("Enter name");
        if (password !== confirm) return alert("Passwords not match");

        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name,
            email,
            password,
            role: currentRole
          })
        });

        const data = await res.json();

        if (res.ok) {
          alert("Account created! Now login");
          toggleMode(new Event('click'));
        } else {
          alert(data.error);
        }

      } else {

        // LOGIN
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          // ✅ THIS FIXES EVERYTHING
          window.location.href = data.redirect;
        } else {
          alert(data.error || "Invalid login");
        }
      }
    }
  </script>

</body>

</html>
