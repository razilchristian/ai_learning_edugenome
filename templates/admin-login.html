<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduGenome - Admin Authentication</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
<div id="splash"></div>





  <!-- Mobile Splash Screen -->
  <div id="splashScreen" class="mobile-splash">
    <img src="/eduimage.jpeg" alt="EduGenome Splash">
  </div>
  <style>
    .mobile-splash {
      position: fixed; inset: 0; background: #fff; z-index: 9999; 
      display: flex; align-items: center; justify-content: center; 
      transition: opacity 0.5s ease;
    }
    .mobile-splash img {
      width: 100%; height: 100%; object-fit: cover;
    }
    @media (min-width: 769px) {
      .mobile-splash { display: none !important; }
    }
  </style>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splashScreen');
        if (splash && window.innerWidth <= 768) {
          splash.style.opacity = '0';
          setTimeout(() => splash.style.display = 'none', 500);
        } else if (splash) {
          splash.style.display = 'none';
        }
      }, 2000);
    });
  </script>

  <div class="login-layout">
    <!-- Left: Form -->
    <div class="flex items-center justify-center p-6 bg-white" style="overflow-y:auto">
      <div style="width:100%;max-width:420px">
        <div class="text-center mb-8">
          <a href="/" class="flex items-center gap-2 justify-center mb-6">
            <i data-lucide="brain" style="width:40px;height:40px;color:var(--accent)"></i>
            <span class="logo-text-lg" style="font-size:28px">EduGenome</span>
          </a>
          <h2 class="font-bold text-slate-900 mb-2" style="font-size:28px" id="pageTitle">Welcome Back</h2>
          <p class="text-slate-600" id="pageDesc">Sign in to your admin account</p>
        </div>

        <div class="mb-4"></div>

        <!-- Unified Form -->
        <div class="card">
          <div class="card-header">
            <div class="card-title" id="formTitle">Admin Login</div>
            <div class="card-desc" id="formDesc">Manage the platform and monitor system analytics</div>
          </div>
          <div class="card-content space-y-4">
            <div id="nameField" style="display: none;">
              <label class="label">Full Name</label>
              <input type="text" id="name" class="input" placeholder="Enter your full name">
            </div>
            <div>
              <label class="label">Email</label>
              <input type="email" id="email" class="input" placeholder="Enter your email">
            </div>
            <div>
              <label class="label">Password</label>
              <input type="password" id="password" class="input" placeholder="Enter your password">
            </div>
            <div id="confirmPasswordField" style="display: none;">
              <label class="label">Confirm Password</label>
              <input type="password" id="confirmPassword" class="input" placeholder="Confirm your password">
            </div>

            <button onclick="submitForm()" class="btn btn-primary btn-full" id="submitBtn"
              style="background:linear-gradient(135deg,var(--primary),var(--accent))">Sign In</button>
          </div>
        </div>

        <p class="text-center text-sm text-slate-600 mt-6" id="toggleText">
          Don't have an account? <a href="#" onclick="toggleMode(event)"
            style="color:var(--accent);font-weight:500">Sign Up</a>
        </p>
      </div>
    </div>

    <!-- Right: Visual -->
    <div class="login-right">
      <div class="login-orb1"></div>
      <div class="login-orb2"></div>
      <div class="text-center text-white space-y-6" style="max-width:480px;position:relative;z-index:1">
        <img src="https://images.unsplash.com/photo-1677212004257-103cfa6b59d0?w=600&auto=format&fit=crop"
          alt="AI Education" class="rounded-3xl shadow-2xl mb-8">
        <h3 class="font-bold text-white" style="font-size:28px">Personalized Learning, Powered by AI</h3>
        <p class="text-white opacity-90" style="font-size:18px">Join thousands of students, teachers, and institutions
          using EduGenome to revolutionize education.</p>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();

    let currentRole = 'admin';
    let isLoginMode = true;

    function updateUI() {
      document.getElementById('pageTitle').innerText = isLoginMode ? 'Welcome Back' : 'Create an Account';
      document.getElementById('pageDesc').innerText = isLoginMode ? 'Sign in to your admin account' : 'Sign up to manage the platform';

      document.getElementById('formTitle').innerText = 'Admin' + (isLoginMode ? ' Login' : ' Registration');
      document.getElementById('formDesc').innerText = 'Manage the platform and monitor system analytics';

      document.getElementById('nameField').style.display = isLoginMode ? 'none' : 'block';
      document.getElementById('confirmPasswordField').style.display = isLoginMode ? 'none' : 'block';

      document.getElementById('submitBtn').innerText = isLoginMode ? 'Sign In' : 'Create Account';

      const toggleLink = isLoginMode ? 'Sign Up' : 'Sign In';
      const togglePrompt = isLoginMode ? "Don't have an account?" : 'Already have an account?';

      document.getElementById('toggleText').innerHTML = `${togglePrompt} <a href="#" onclick="toggleMode(event)" style="color:var(--accent);font-weight:500">${toggleLink}</a>`;
    }

    function toggleMode(e) {
      if (e) e.preventDefault();
      isLoginMode = !isLoginMode;
      updateUI();
    }

    async function submitForm() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        return alert('Please enter both email and password.');
      }

      if (!isLoginMode) {
        const name = document.getElementById('name').value.trim();
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (!name) return alert('Please enter your full name.');
        if (password !== confirmPassword) return alert('Passwords do not match.');

        try {
          const res = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password, role: currentRole })
          });
          const data = await res.json();
          if (res.ok) {
            alert('Account created successfully! You can now sign in.');
            isLoginMode = true;
            document.getElementById('password').value = '';
            document.getElementById('confirmPassword').value = '';
            updateUI();
          } else {
            alert(data.error || 'Registration failed');
          }
        } catch (e) {
          alert('Server error');
        }
      } else {
        // Login
        try {
          const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password, role: currentRole })
          });

          const data = await res.json();

          if (res.ok) {
            if (data.redirect && data.redirect !== "undefined") {
              window.location.href = data.redirect;
            } else {
              window.location.href = "/admin";
            }
          } else {
            alert(data.error || 'Invalid email or password');
          }

        } catch (e) {
          alert('Server error');
        }
      }
    }

    // Init UI
    updateUI();
  </script>






<script>
window.addEventListener("load", () => {
  const splash = document.getElementById("splash");
  const hasSeenSplash = sessionStorage.getItem("splashShown");

  if (window.innerWidth < 768 && !hasSeenSplash) {
    sessionStorage.setItem("splashShown", "true");

    setTimeout(() => {
      splash.style.transition = "opacity 0.8s ease";
      splash.style.opacity = "0";

      setTimeout(() => {
        splash.style.display = "none";
      }, 800);

    }, 4500);
  } else {
    splash.style.display = "none";
  }
});

// Mobile Sidebar Toggle
document.addEventListener('click', (e) => {
  const sidebar = document.querySelector('.sidebar');
  const menuBtn = document.querySelector('.mobile-menu-btn');
  if (sidebar && menuBtn) {
    if (menuBtn.contains(e.target)) {
      // Menu button clicked
    } else if (sidebar.classList.contains('open') && !sidebar.contains(e.target)) {
      sidebar.classList.remove('open');
    }
  }
});
</script>
</body>

</html>
